services:
  web:
    build: ./src
    volumes:
      - ./src/:/usr/src/app/
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://hello_fastapi:hello_fastapi@db/hello_fastapi_dev
      - SECRET_KEY=your-secret-key-change-in-production
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8002
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:14-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=hello_fastapi
      - POSTGRES_PASSWORD=hello_fastapi
      - POSTGRES_DB=hello_fastapi_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_fastapi -d hello_fastapi_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  vue-client:
    build: ./vue-client
    volumes:
      - ./vue-client/:/usr/src/app/
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8002
    depends_on:
      - web

volumes:
  postgres_data:

networks:
  default: 
    name: hello_fastapi
